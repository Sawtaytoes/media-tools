<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jobs</title>
<link rel="stylesheet" href="/progress-utils.css" />
<link rel="stylesheet" href="/jobs.css" />
</head>
<body>

<h1>Jobs <a href="/builder" style="font-size:0.75rem;font-weight:400;color:#60a5fa;text-decoration:none;margin-left:12px">Sequence Builder ↗</a></h1>
<div id="status-bar">Connecting…</div>
<div class="jobs" id="jobs"></div>

<script src="/sse-utils.js"></script>
<script src="/progress-utils.js"></script>
<script src="/command-labels.js"></script>
<script src="/reload-on-restart.js"></script>
<script src="/version-footer.js" defer></script>
<script type="module">
// Opt-in MSW bootstrap. The dynamic import keeps the regular page weight
// at zero — only browsers loaded with `?mock=1` (or localStorage.useMocks
// truthy) pull MSW from the CDN and register the service worker. We
// `await` the registration BEFORE the main bootstrap module below
// runs (browsers execute module scripts sequentially in document
// order, blocking later ones on earlier ones' top-level await), so
// the very first /jobs/stream EventSource sees the worker active and
// gets the canned data.
const { enableMocksIfRequested } = await import("/mocks/browser.js");
await enableMocksIfRequested();
</script>
<script type="module" src="/jobs/main.js"></script>

</body>
</html>
