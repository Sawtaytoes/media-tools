<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sequence Builder</title>
<script src="/vendor/tailwind-3.4.17.js"></script>
<script src="/vendor/js-yaml-4.1.1.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-200 font-sans text-sm">

<div class="flex flex-col" style="height:100dvh;overflow:hidden">

  <!-- Header -->
  <div class="shrink-0 flex items-center justify-between px-4 py-3 border-b border-slate-700 bg-slate-900 z-10">
    <h1 class="font-semibold text-slate-100">Sequence Builder</h1>
    <div class="flex items-center gap-4">
      <button onclick="toggleLoad()" class="text-xs text-blue-400 hover:text-blue-300">Load YAML</button>
      <button onclick="copyYaml()" id="copy-btn" class="text-xs text-blue-400 hover:text-blue-300">Copy YAML</button>
      <button onclick="openYamlModal()" class="text-xs text-blue-400 hover:text-blue-300">View YAML</button>
      <a href="/" class="text-xs text-slate-400 hover:text-slate-300">Jobs ↗</a>
    </div>
  </div>

  <!-- Load YAML panel -->
  <div id="load-panel" class="hidden shrink-0 px-4 py-3 border-b border-slate-700 bg-slate-800/60">
    <p class="text-xs text-slate-400 mb-2">Paste saved YAML to restore sequence</p>
    <textarea id="load-input" rows="5"
      class="w-full bg-slate-900 text-slate-200 text-xs font-mono p-2 rounded border border-slate-600 resize-y focus:outline-none focus:border-blue-500"
      placeholder="- command: copyFiles&#10;  params:&#10;    sourcePath: /src&#10;    destinationPath: /dst"></textarea>
    <div class="flex items-center gap-3 mt-2">
      <button onclick="loadYaml()" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded">Load</button>
      <button onclick="toggleLoad()" class="text-xs text-slate-400 hover:text-slate-300">Cancel</button>
      <span id="load-error" class="text-xs text-red-400 hidden"></span>
    </div>
  </div>

  <!-- Step list -->
  <div id="steps-el" class="flex-1 overflow-y-auto p-4 grid gap-3 auto-rows-min grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 content-start"></div>

  <!-- Footer toolbar -->
  <div class="shrink-0 flex flex-wrap items-center gap-2 px-4 py-3 border-t border-slate-700 bg-slate-900">
    <select id="cmd-pick" onchange="addPicked()" class="flex-1 min-w-0 bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500">
      <option value="">— pick command —</option>
    </select>
    <button onclick="addPicked()" class="text-xs bg-slate-600 hover:bg-slate-500 text-white px-3 py-1.5 rounded font-medium shrink-0">+ Add</button>
    <button onclick="addPath()" class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded font-medium shrink-0" title="Add a path variable">+ Path</button>
    <button id="run-btn" onclick="runSequence()"
      class="ml-auto text-xs bg-emerald-700 hover:bg-emerald-600 disabled:opacity-40 text-white px-4 py-1.5 rounded font-medium shrink-0">
      ▶ Run Sequence
    </button>
  </div>

</div>

<!-- YAML modal -->
<div id="yaml-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70" onclick="closeYamlModal(event)">
  <div class="bg-slate-900 border border-slate-700 rounded-xl flex flex-col" style="width:min(90vw,800px);max-height:85vh" onclick="event.stopPropagation()">
    <div class="shrink-0 flex items-center justify-between px-4 py-2 border-b border-slate-700">
      <span class="text-xs font-medium text-slate-400">YAML</span>
      <div class="flex items-center gap-3">
        <button onclick="copyYaml()" id="modal-copy-btn" class="text-xs text-blue-400 hover:text-blue-300">Copy</button>
        <button onclick="closeYamlModal()" class="text-xs text-slate-400 hover:text-slate-200">✕ Close</button>
      </div>
    </div>
    <pre id="yaml-out" class="flex-1 overflow-auto p-4 text-xs text-emerald-400 font-mono leading-relaxed whitespace-pre"></pre>
  </div>
</div>

<!-- Prompt modal -->
<div id="prompt-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80">
  <div class="bg-slate-900 border border-slate-600 rounded-xl flex flex-col gap-4 p-6" style="width:min(90vw,560px);max-height:85vh">
    <div>
      <p class="text-xs text-slate-400 mb-1 font-medium">Job requires input</p>
      <pre id="prompt-message" class="text-sm text-slate-200 font-mono whitespace-pre-wrap"></pre>
    </div>
    <div id="prompt-options" class="flex flex-col gap-2 overflow-y-auto"></div>
    <p class="text-xs text-slate-500">Press a number key to select, or click an option.</p>
  </div>
</div>

<!-- Lookup modal -->
<div id="lookup-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80" onclick="closeLookupModal(event)">
  <div class="bg-slate-900 border border-slate-600 rounded-xl flex flex-col gap-4 p-6" style="width:min(90vw,640px);max-height:85vh" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between gap-3 shrink-0">
      <div class="flex items-center gap-2">
        <button id="lookup-back-btn" onclick="lookupGoBack()" class="hidden text-xs text-slate-400 hover:text-slate-200">← Back</button>
        <p id="lookup-title" class="text-sm font-medium text-slate-200">Lookup</p>
      </div>
      <button onclick="closeLookupModal()" class="text-slate-500 hover:text-slate-200 text-lg leading-none w-7 h-7 flex items-center justify-center rounded hover:bg-slate-800">✕</button>
    </div>
    <div id="lookup-body" class="flex flex-col gap-3 overflow-y-auto min-h-0"></div>
  </div>
</div>

const TAG_ORDER = [
  "File Operations","Audio Operations","Track Operations",
  "Subtitle Operations","Analysis","Naming Operations",
  "Video Operations","Metadata Operations",
]

// ─── State ────────────────────────────────────────────────────────────────────

let steps = []
let stepCounter = 0
let running = false
const stepLogs = new Map()

// Path variable registry — [{ id: string, label: string, value: string }]
let paths = []

function randomHex() {
  return Math.random().toString(36).slice(2, 8)
}

function initPaths() {
  if (!paths.length) {
    paths = [{ id: 'path_' + randomHex(), label: 'Base Path', value: '' }]
  }
}

// ─── URL persistence ──────────────────────────────────────────────────────────

function updateUrl() {
  const params = new URLSearchParams()
  const yaml = toYamlStr()
  if (yaml !== '# No steps yet') params.set('seq', btoa(unescape(encodeURIComponent(yaml))))
  const query = params.toString()
  history.replaceState(null, '', window.location.pathname + (query ? '?' + query : ''))
}

function restoreFromUrl() {
  const params = new URLSearchParams(window.location.search)
  const seq = params.get('seq')
  const base = params.get('base')  // old format backward compat
  if (seq) {
    try {
      const yaml = decodeURIComponent(escape(atob(seq)))
      loadYamlFromText(yaml)
      // If old URL had a separate base= param and new YAML has no value in paths[0], apply it
      if (base && paths.length > 0 && !paths[0].value) paths[0].value = base
    } catch {}
  } else if (base) {
    initPaths()
    paths[0].value = base
  }
}

// ─── Path helpers ─────────────────────────────────────────────────────────────

function mainSrcField(commandName) {
  const cmd = COMMANDS[commandName]
  for (const n of ['sourcePath','sourceFilesPath','mediaFilesPath']) {
    if (cmd.fields.some(f => f.name === n)) return n
  }
  const pf = cmd.fields.find(f => f.type === 'path')
  return pf ? pf.name : null
}

function stepOutput(step) {
  const cmd = COMMANDS[step.command]
  const msf = mainSrcField(step.command)
  let src = msf ? (linkedVal(step, msf) ?? step.params[msf] ?? '') : ''
  src = src.replace(/[\\/]$/, '')

  if (cmd.outputFolderName) return src ? src + '/' + cmd.outputFolderName : cmd.outputFolderName

  const hasField = n => cmd.fields.some(f => f.name === n)
  if (hasField('destinationPath') && step.params.destinationPath) return step.params.destinationPath
  if (hasField('destinationFilesPath') && step.params.destinationFilesPath) return step.params.destinationFilesPath
  return src
}

function linkedVal(step, fieldName) {
  const srcId = step.links?.[fieldName]
  if (!srcId) return null
  if (typeof srcId === 'string') {
    const pv = paths.find(p => p.id === srcId)
    return pv?.value || null
  }
  const src = steps.find(s => s.id === srcId)
  return src ? stepOutput(src) : null
}

// ─── Step CRUD ────────────────────────────────────────────────────────────────

function makeStep(command) {
  const cmd = COMMANDS[command]
  const params = {}
  for (const f of cmd.fields) if (f.default !== undefined) params[f.name] = f.default
  return { id: ++stepCounter, command, params, links: {}, status: null, error: null }
}

function addPicked() {
  const sel = document.getElementById('cmd-pick')
  if (!sel.value) return
  const step = makeStep(sel.value)
  const msf = mainSrcField(sel.value)
  if (msf) {
    const prevStep = steps.at(-1)
    if (prevStep) {
      step.links[msf] = prevStep.id
    } else {
      step.links[msf] = paths[0].id
    }
  }
  steps.push(step)
  renderAll()
}

function insertAt(index) {
  const sel = document.getElementById('cmd-pick')
  if (!sel.value) {
    sel.classList.add('ring-2', 'ring-red-500')
    sel.focus()
    setTimeout(() => sel.classList.remove('ring-2', 'ring-red-500'), 800)
    return
  }
  const step = makeStep(sel.value)
  const msf = mainSrcField(sel.value)
  if (msf) {
    const prevStep = steps[index - 1]
    if (prevStep) {
      step.links[msf] = prevStep.id
    } else {
      step.links[msf] = paths[0].id
    }
  }
  steps.splice(index, 0, step)
  renderAll()
}

function removeStep(id) {
  const i = steps.findIndex(s => s.id === id)
  steps.splice(i, 1)
  // Remove any links pointing to removed step
  for (const s of steps) {
    for (const [k, v] of Object.entries(s.links)) {
      if (v === id) delete s.links[k]
    }
  }
  renderAll()
}

function moveStep(id, dir) {
  const i = steps.findIndex(s => s.id === id)
  const j = i + dir
  if (j < 0 || j >= steps.length) return
  ;[steps[i], steps[j]] = [steps[j], steps[i]]
  // Clear any links that now point to a step at or after the linking step's position
  steps.forEach((step, stepIndex) => {
    for (const [field, srcId] of Object.entries(step.links)) {
      if (typeof srcId === 'string') continue  // path var link — never goes stale
      const srcIndex = steps.findIndex(s => s.id === srcId)
      if (srcIndex >= stepIndex) delete step.links[field]
    }
  })
  renderAll()
}

// ─── Param handlers ───────────────────────────────────────────────────────────

function setParam(id, fieldName, value) {
  const step = steps.find(s => s.id === id)
  if (!step) return
  step.params[fieldName] = value
  refreshLinkedInputs()
  updateYaml()
}

function setLink(id, field, srcIdStr) {
  const step = steps.find(s => s.id === id)
  if (!step) return
  if (srcIdStr) {
    // Numeric string = step ID; non-numeric string = path var ID
    step.links[field] = /^\d+$/.test(srcIdStr) ? Number(srcIdStr) : srcIdStr
  } else {
    delete step.links[field]
  }
  // Update the linked input
  const linkedInput = document.querySelector(`[data-step="${id}"][data-field="${field}"].linked-input`)
  const manualInput = document.querySelector(`[data-step="${id}"][data-field="${field}"].manual-input`)
  const val = linkedVal(step, field)
  if (val !== null) {
    if (linkedInput) { linkedInput.value = val; linkedInput.classList.remove('hidden') }
    if (manualInput) manualInput.classList.add('hidden')
  } else {
    if (linkedInput) linkedInput.classList.add('hidden')
    if (manualInput) manualInput.classList.remove('hidden')
  }
  refreshLinkedInputs()
  updateYaml()
}

function refreshLinkedInputs() {
  for (const step of steps) {
    for (const [field, srcId] of Object.entries(step.links)) {
      const inp = document.querySelector(`[data-step="${step.id}"][data-field="${field}"].linked-input`)
      if (inp) inp.value = linkedVal(step, field) ?? ''
    }
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────

function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function renderPathVarCard(pv, isFirst) {
  const labelHtml = isFirst
    ? `<span class="text-xs font-medium text-slate-300">${esc(pv.label)}</span>`
    : `<input type="text" value="${esc(pv.label)}" oninput="setPathLabel('${pv.id}',this.value)"
        class="text-xs font-medium text-slate-300 bg-transparent border-b border-slate-600 focus:outline-none focus:border-blue-500 w-28 min-w-0" />`
  const deleteBtn = !isFirst
    ? `<button onclick="removePath('${pv.id}')" title="Remove path variable"
        class="ml-auto text-xs text-slate-500 hover:text-red-400 w-5 h-5 flex items-center justify-center rounded hover:bg-slate-700">✕</button>`
    : ''
  return `<div class="col-span-full bg-slate-800/40 rounded-xl border border-dashed border-slate-600 px-4 py-3">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-slate-500 text-xs shrink-0">📁</span>
      ${labelHtml}
      <span class="text-xs text-slate-600 font-mono shrink-0">path variable</span>
      ${deleteBtn}
    </div>
    <input type="text" value="${esc(pv.value)}" placeholder="/mnt/media or D:\\Media"
      oninput="setPathValue('${pv.id}',this.value)"
      class="w-full bg-slate-900 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" />
  </div>`
}

function setPathValue(pvId, value) {
  const pv = paths.find(p => p.id === pvId)
  if (!pv) return
  pv.value = value
  refreshLinkedInputs()
  updateYaml()
  updateUrl()
}

function setPathLabel(pvId, label) {
  const pv = paths.find(p => p.id === pvId)
  if (!pv) return
  pv.label = label
  updateYaml()
  updateUrl()
}

function removePath(pvId) {
  const i = paths.findIndex(p => p.id === pvId)
  if (i <= 0) return  // can't remove Base Path (index 0)
  paths.splice(i, 1)
  for (const s of steps) {
    for (const [k, v] of Object.entries(s.links)) {
      if (v === pvId) delete s.links[k]
    }
  }
  renderAll()
}

function addPath() {
  paths.push({ id: 'path_' + randomHex(), label: 'Path ' + paths.length, value: '' })
  renderAll()
}

function renderInsertDivider(index) {
  return `<div class="col-span-full flex items-center group -my-0.5">
    <div class="flex-1 h-px bg-slate-700/50 group-hover:bg-slate-600 transition-colors"></div>
    <button onclick="insertAt(${index})" title="Insert step here"
      class="flex items-center gap-1 px-2.5 py-0.5 mx-1 text-xs text-slate-600 hover:text-blue-400 rounded-full border border-transparent hover:border-blue-500/40 hover:bg-slate-800 transition-all whitespace-nowrap">
      (+) insert
    </button>
    <div class="flex-1 h-px bg-slate-700/50 group-hover:bg-slate-600 transition-colors"></div>
  </div>`
}

function renderAll() {
  initPaths()
  const el = document.getElementById('steps-el')
  const parts = []

  paths.forEach((pv, i) => parts.push(renderPathVarCard(pv, i === 0)))

  if (!steps.length) {
    parts.push('<p class="col-span-full text-slate-500 text-xs text-center mt-4">No steps yet — select a command below to add one</p>')
  } else {
    steps.forEach((s, i) => {
      parts.push(renderStep(s, i))
      if (i < steps.length - 1) parts.push(renderInsertDivider(i + 1))
    })
  }

  el.innerHTML = parts.join('')
  updateYaml()
  updateUrl()
}

function renderStep(step, index) {
  const cmd = COMMANDS[step.command]
  const statusBadge = step.status ? renderStatusBadge(step.status) : ''
  const isFirst = index === 0, isLast = index === steps.length - 1

  const cmdOptions = TAG_ORDER.map(tag => {
    const cmds = Object.entries(COMMANDS).filter(([,c]) => c.tag === tag)
    if (!cmds.length) return ''
    return `<optgroup label="${esc(tag)}">${cmds.map(([name,c]) =>
      `<option value="${esc(name)}"${step.command === name ? ' selected' : ''}>${esc(name)}</option>`
    ).join('')}</optgroup>`
  }).join('')

  return `
<div id="step-${step.id}" class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
  <div class="flex items-center gap-2 px-3 py-2 border-b border-slate-700 bg-slate-800/80">
    <span class="text-xs font-mono text-slate-500 shrink-0 w-5 text-center">${index + 1}</span>
    <select onchange="changeCommand(${step.id}, this.value)"
      class="flex-1 min-w-0 bg-slate-700 text-slate-200 text-xs rounded px-2 py-1 border border-slate-600 focus:outline-none focus:border-blue-500">
      ${cmdOptions}
    </select>
    ${statusBadge}
    <div class="flex items-center gap-1 shrink-0">
      <button onclick="moveStep(${step.id},-1)" ${isFirst ? 'disabled' : ''}
        class="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-slate-200 hover:bg-slate-700 disabled:opacity-30 text-xs">↑</button>
      <button onclick="moveStep(${step.id},1)" ${isLast ? 'disabled' : ''}
        class="w-6 h-6 flex items-center justify-center rounded text-slate-400 hover:text-slate-200 hover:bg-slate-700 disabled:opacity-30 text-xs">↓</button>
      <button onclick="removeStep(${step.id})"
        class="w-6 h-6 flex items-center justify-center rounded text-slate-500 hover:text-red-400 hover:bg-slate-700 text-xs">✕</button>
    </div>
  </div>
  <div class="px-3 py-2">
    <p class="text-xs text-slate-500 mb-2">${esc(cmd.summary)}</p>
    ${cmd.outputFolderName ? `<p class="text-xs text-amber-500/80 mb-2">→ outputs to <code class="text-amber-400 bg-slate-900 px-1 rounded">${esc(cmd.outputFolderName)}/</code> subfolder</p>` : ''}
    ${step.error ? `<p class="text-xs text-red-400 bg-red-950/40 rounded px-2 py-1 mb-2 font-mono">${esc(step.error)}</p>` : ''}
    <div class="space-y-2">${renderFields(step, index)}</div>
  </div>
</div>`
}

function renderStatusBadge(status) {
  const map = {
    pending:   'bg-blue-950 text-blue-300',
    running:   'bg-blue-950 text-blue-400 animate-pulse',
    completed: 'bg-emerald-950 text-emerald-400',
    failed:    'bg-red-950 text-red-400',
  }
  return `<span class="status-badge shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${map[status] ?? ''}">${esc(status)}</span>`
}

function renderFields(step, stepIndex) {
  const cmd = COMMANDS[step.command]
  return cmd.fields.map(field => {
    const val = step.params[field.name]
    const label = `<label class="block text-xs text-slate-400 mb-1">${esc(field.label)}${field.required ? ' <span class="text-red-400">*</span>' : ''}</label>`

    if (field.type === 'boolean') {
      const checked = val ?? field.default ?? false
      return `<label class="flex items-center gap-2 cursor-pointer select-none py-0.5">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="setParam(${step.id},'${field.name}',this.checked)"
          class="w-3.5 h-3.5 rounded bg-slate-700 border-slate-500 accent-blue-500 cursor-pointer" />
        <span class="text-xs text-slate-300">${esc(field.label)}</span>
      </label>`
    }

    if (field.type === 'path') {
      return renderPathField(step, field, stepIndex)
    }

    if (field.type === 'number') {
      const num = val ?? field.default ?? ''
      const companion = field.companionNameField ? step.params[field.companionNameField] : null
      const reverseLookup = field.companionNameField ? `oninput="scheduleReverseLookup(${step.id},'${field.name}',this.value)"` : ''
      return `<div>${label}<input type="number" value="${esc(num)}"
        ${reverseLookup}
        onchange="setParam(${step.id},'${field.name}',this.value===''?undefined:Number(this.value))"
        class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500" />
        ${field.companionNameField ? `<p data-step="${step.id}" data-companion="${field.name}" class="text-xs text-slate-500 mt-0.5 truncate ${companion ? '' : 'hidden'}" title="${esc(companion ?? '')}">${esc(companion ?? '')}</p>` : ''}
      </div>`
    }

    if (field.type === 'numberWithLookup') {
      const num = val ?? field.default ?? ''
      const companion = field.companionNameField ? step.params[field.companionNameField] : null
      return `<div>${label}<div class="flex items-center gap-2">
        <input type="number" value="${esc(num)}" placeholder="${esc(field.placeholder ?? '')}"
          oninput="scheduleReverseLookup(${step.id},'${field.name}',this.value)"
          onchange="setParam(${step.id},'${field.name}',this.value===''?undefined:Number(this.value))"
          class="flex-1 min-w-0 bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500" />
        <button onclick="openLookup('${field.lookupType}',${step.id},'${field.name}')"
          title="Look up ${esc(field.label)}"
          class="shrink-0 text-xs bg-slate-700 hover:bg-blue-700 text-slate-200 hover:text-white px-2.5 py-1.5 rounded border border-slate-600 hover:border-blue-500">🔍</button>
      </div>
      <p data-step="${step.id}" data-companion="${field.name}" class="text-xs text-slate-500 mt-0.5 truncate ${companion ? '' : 'hidden'}" title="${esc(companion ?? '')}">${esc(companion ?? '')}</p>
      </div>`
    }

    if (field.type === 'languageCode') {
      const str = val ?? ''
      return `<div>${label}<input type="text" value="${esc(str)}" placeholder="eng"
        oninput="setParam(${step.id},'${field.name}',this.value||undefined)"
        maxlength="3"
        class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" /></div>`
    }

    if (field.type === 'languageCodes') {
      const str = Array.isArray(val) ? val.join(', ') : (val ?? '')
      return `<div>${label}<input type="text" value="${esc(str)}" placeholder="${esc(field.placeholder ?? 'eng, jpn')}"
        oninput="setParam(${step.id},'${field.name}',this.value.split(',').map(s=>s.trim()).filter(Boolean))"
        class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" /></div>`
    }

    if (field.type === 'stringArray') {
      const str = Array.isArray(val) ? val.join(', ') : (val ?? '')
      return `<div>${label}<input type="text" value="${esc(str)}" placeholder="${esc(field.placeholder ?? '')}"
        oninput="setParam(${step.id},'${field.name}',this.value.split(',').map(s=>s.trim()).filter(Boolean))"
        class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" /></div>`
    }

    if (field.type === 'numberArray') {
      const str = Array.isArray(val) ? val.join(', ') : (val ?? '')
      return `<div>${label}<input type="text" value="${esc(str)}" placeholder="${esc(field.placeholder ?? '0, 100')}"
        oninput="setParam(${step.id},'${field.name}',this.value.split(',').map(s=>s.trim()).filter(Boolean).map(Number).filter(n=>!isNaN(n)))"
        class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" /></div>`
    }

    if (field.type === 'json') {
      const str = val !== undefined ? (typeof val === 'string' ? val : JSON.stringify(val, null, 2)) : ''
      return `<div>${label}<textarea rows="3" placeholder="${esc(field.placeholder ?? '[]')}"
        oninput="setParamJson(${step.id},'${field.name}',this.value)"
        class="w-full bg-slate-900 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono resize-y">${esc(str)}</textarea></div>`
    }

    // string
    const str = val ?? ''
    return `<div>${label}<input type="text" value="${esc(str)}" placeholder="${esc(field.placeholder ?? '')}"
      oninput="setParam(${step.id},'${field.name}',this.value||undefined)"
      class="w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500" /></div>`
  }).join('')
}

function renderPathField(step, field, stepIndex) {
  const val = step.params[field.name] ?? ''
  const linkedStepId = step.links[field.name]
  const computed = linkedStepId ? (linkedVal(step, field.name) ?? '') : null

  const pathVarOptions = paths.map(pv =>
    `<option value="${pv.id}"${linkedStepId === pv.id ? ' selected' : ''}>${esc(pv.label)}${pv.value ? ' → ' + pv.value : ''}</option>`
  ).join('')

  // Build previous step options
  const prevOptions = steps.slice(0, stepIndex).map((s, i) => {
    const out = stepOutput(s)
    const label = `Step ${i + 1}: ${s.command}${out ? ' → ' + out : ''}`
    return `<option value="${s.id}"${linkedStepId === s.id ? ' selected' : ''}>${esc(label)}</option>`
  }).join('')

  return `<div>
    <div class="flex items-center gap-2 mb-1">
      <label class="text-xs text-slate-400">${esc(field.label)}${field.required ? ' <span class="text-red-400">*</span>' : ''}</label>
      <select onchange="setLink(${step.id},'${field.name}',this.value)"
        class="ml-auto text-xs bg-slate-700 text-slate-300 rounded px-1.5 py-0.5 border border-slate-600 focus:outline-none focus:border-blue-500 max-w-[200px] truncate">
        <option value="">— manual —</option>
        ${pathVarOptions}
        ${prevOptions}
      </select>
    </div>
    <input type="text" value="${esc(computed ?? val)}" ${computed !== null ? 'readonly' : ''}
      data-step="${step.id}" data-field="${field.name}"
      class="${computed !== null ? 'linked-input' : 'manual-input'} w-full bg-slate-${computed !== null ? '900' : '700'} text-slate-${computed !== null ? '400' : '200'} text-xs rounded px-2 py-1.5 border border-slate-${computed !== null ? '700' : '600'} focus:outline-none focus:border-blue-500 font-mono"
      ${computed !== null ? '' : `oninput="setParam(${step.id},'${field.name}',this.value||undefined)"`} />
    ${computed !== null ? `<input type="text" value="${esc(val)}" data-step="${step.id}" data-field="${field.name}" class="manual-input hidden w-full bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500 font-mono" oninput="setParam(${step.id},'${field.name}',this.value||undefined)" />` : ''}
  </div>`
}

function changeCommand(id, command) {
  const step = steps.find(s => s.id === id)
  if (!step) return
  step.command = command
  step.params = {}
  step.links = {}
  step.status = null
  step.error = null
  const cmd = COMMANDS[command]
  for (const f of cmd.fields) if (f.default !== undefined) step.params[f.name] = f.default
  renderAll()
}

function setParamJson(id, field, raw) {
  const step = steps.find(s => s.id === id)
  if (!step) return
  try {
    step.params[field] = JSON.parse(raw)
  } catch {
    step.params[field] = raw
  }
  updateYaml()
}

// ─── YAML ─────────────────────────────────────────────────────────────────────

function buildParams(step) {
  const cmd = COMMANDS[step.command]
  const out = {}
  for (const field of cmd.fields) {
    let val = step.params[field.name]

    if (field.type === 'path') {
      const srcId = step.links?.[field.name]
      if (srcId) {
        if (typeof srcId === 'string') {
          val = '@' + srcId  // path var reference — store as @id, not resolved value
        } else {
          const lv = linkedVal(step, field.name)
          if (lv !== null) val = lv
        }
      }
    }

    const skipPrimary = (
      val === undefined || val === null || val === ''
      || (Array.isArray(val) && val.length === 0)
      || (!field.required && field.default !== undefined && val === field.default)
    )
    if (!skipPrimary) out[field.name] = val

    // Companion display-name field (purely visual; emitted whenever set)
    if (field.companionNameField) {
      const cv = step.params[field.companionNameField]
      if (cv !== undefined && cv !== null && cv !== '') {
        out[field.companionNameField] = cv
      }
    }
  }
  return out
}

function toYamlStr() {
  const hasContent = steps.length || paths.some(p => p.value)
  if (!hasContent) return '# No steps yet'
  const pathsObj = {}
  for (const pv of paths) pathsObj[pv.id] = { label: pv.label, value: pv.value }
  const data = {
    paths: pathsObj,
    steps: steps.map(s => ({ command: s.command, params: buildParams(s) })),
  }
  return jsyaml.dump(data, { lineWidth: -1, flowLevel: 3, indent: 2 })
}

function updateYaml() {
  const modal = document.getElementById('yaml-modal')
  if (!modal.classList.contains('hidden')) {
    document.getElementById('yaml-out').textContent = toYamlStr()
  }
}

function copyYaml() {
  navigator.clipboard.writeText(toYamlStr()).then(() => {
    for (const id of ['copy-btn', 'modal-copy-btn']) {
      const btn = document.getElementById(id)
      if (!btn) continue
      const original = btn.textContent
      btn.textContent = 'Copied!'
      setTimeout(() => { btn.textContent = original }, 2000)
    }
  })
}

function openYamlModal() {
  document.getElementById('yaml-out').textContent = toYamlStr()
  document.getElementById('yaml-modal').classList.remove('hidden')
}

function closeYamlModal(event) {
  if (!event || event.target === document.getElementById('yaml-modal')) {
    document.getElementById('yaml-modal').classList.add('hidden')
  }
}

document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') closeYamlModal()
})

// ─── Load YAML ────────────────────────────────────────────────────────────────

function toggleLoad() {
  const panel = document.getElementById('load-panel')
  panel.classList.toggle('hidden')
  document.getElementById('load-error').classList.add('hidden')
}

function loadYamlFromText(text) {
  const data = jsyaml.load(text)

  let stepsData
  if (data && typeof data === 'object' && !Array.isArray(data) && data.steps !== undefined) {
    // New format: { paths: {...}, steps: [...] }
    if (data.paths && typeof data.paths === 'object') {
      paths = Object.entries(data.paths).map(([id, pv]) => ({
        id,
        label: pv.label || id,
        value: pv.value || '',
      }))
    }
    if (!paths.length) initPaths()
    stepsData = data.steps || []
  } else if (Array.isArray(data)) {
    // Old format: plain array of steps
    initPaths()
    stepsData = data
  } else {
    throw new Error('Expected a YAML sequence or object with "steps" key')
  }

  steps = []
  for (const item of stepsData) {
    if (!item.command) throw new Error('Each step must have a "command" key')
    if (!COMMANDS[item.command]) throw new Error(`Unknown command: ${item.command}`)
    const step = makeStep(item.command)
    const cmd = COMMANDS[item.command]
    for (const field of cmd.fields) {
      const v = item.params?.[field.name]
      if (v !== undefined) {
        if (field.type === 'path' && typeof v === 'string' && v.startsWith('@')) {
          const pvId = v.slice(1)
          if (paths.find(p => p.id === pvId)) {
            step.links[field.name] = pvId  // restore path var link
          } else {
            step.params[field.name] = v    // unknown @ref — treat as literal
          }
        } else {
          step.params[field.name] = v
        }
      }
      // Companion display-name field (purely visual)
      if (field.companionNameField) {
        const cv = item.params?.[field.companionNameField]
        if (cv !== undefined) step.params[field.companionNameField] = cv
      }
    }
    steps.push(step)
  }
}

function loadYaml() {
  const text = document.getElementById('load-input').value.trim()
  const errEl = document.getElementById('load-error')
  errEl.classList.add('hidden')
  try {
    loadYamlFromText(text)
    document.getElementById('load-panel').classList.add('hidden')
    renderAll()
    updateUrl()
  } catch (e) {
    errEl.textContent = e.message
    errEl.classList.remove('hidden')
  }
}

// ─── Run sequence ─────────────────────────────────────────────────────────────

async function runSequence() {
  if (running || !steps.length) return
  running = true
  stepLogs.clear()
  document.getElementById('run-btn').disabled = true

  for (const step of steps) {
    step.status = 'pending'
    step.error = null
    step.results = null
    updateStepUI(step)
  }

  for (const step of steps) {
    step.status = 'running'
    updateStepUI(step)

    const params = buildParams(step)

    let resp
    try {
      resp = await fetch(`/commands/${step.command}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(params),
      })
    } catch (e) {
      step.status = 'failed'
      step.error = e.message
      updateStepUI(step)
      break
    }

    if (!resp.ok) {
      step.status = 'failed'
      step.error = `HTTP ${resp.status}: ${await resp.text()}`
      updateStepUI(step)
      break
    }

    const { jobId, outputFolderName } = await resp.json()
    step.jobId = jobId

    // If the API returned an outputFolderName that differs, store it (for future chaining refinement)
    if (outputFolderName) step.runtimeOutputFolderName = outputFolderName

    try {
      await waitForJob(jobId, step.id)
      step.status = 'completed'
    } catch (e) {
      step.status = 'failed'
      step.error = String(e)
    }
    updateStepUI(step)
    if (step.status === 'failed') break
  }

  running = false
  document.getElementById('run-btn').disabled = false
}

function waitForJob(jobId, stepId) {
  stepLogs.set(stepId, [])
  return new Promise((resolve, reject) => {
    const es = new EventSource(`/jobs/${jobId}/logs`)
    es.onmessage = e => {
      try {
        const data = JSON.parse(e.data)
        if (data.done) {
          closePromptModal()
          es.close()
          const step = steps.find(s => s.id === stepId)
          if (step && Array.isArray(data.results) && data.results.length > 0) {
            step.results = data.results
          }
          if (data.status === 'completed') resolve()
          else reject(`Job ended with status: ${data.status}`)
        } else if (data.type === 'prompt') {
          showPromptModal(jobId, data)
        } else if (data.line) {
          const logs = stepLogs.get(stepId) ?? []
          logs.push(data.line)
          stepLogs.set(stepId, logs)
          updateStepLogs(stepId, logs)
        }
      } catch {}
    }
    es.onerror = () => { closePromptModal(); es.close(); reject('SSE connection error') }
  })
}

function showPromptModal(jobId, promptData) {
  document.getElementById('prompt-message').textContent = promptData.message
  const optionsEl = document.getElementById('prompt-options')
  optionsEl.innerHTML = ''
  promptData.options.forEach(option => {
    const btn = document.createElement('button')
    const isSkip = option.index === -1
    btn.className = `text-left text-sm px-4 py-2.5 rounded-lg border transition-colors ${
      isSkip
        ? 'border-slate-600 text-slate-400 hover:bg-slate-700 hover:text-slate-200'
        : 'border-slate-600 text-slate-200 hover:bg-blue-700 hover:border-blue-500'
    }`
    const keyHint = option.index >= 0 && option.index <= 9
      ? `<span class="text-xs font-mono bg-slate-700 px-1.5 py-0.5 rounded mr-2">${option.index}</span>`
      : ''
    btn.innerHTML = `${keyHint}${esc(option.label)}`
    btn.onclick = () => submitPromptChoice(jobId, promptData.promptId, option.index)
    optionsEl.appendChild(btn)
  })
  document.getElementById('prompt-modal').classList.remove('hidden')
  document._promptKeyHandler = e => {
    const num = parseInt(e.key, 10)
    if (!isNaN(num)) {
      const match = promptData.options.find(o => o.index === num)
      if (match) submitPromptChoice(jobId, promptData.promptId, match.index)
    }
    if (e.key === '-' || e.key === 'Escape') {
      const skipOpt = promptData.options.find(o => o.index === -1)
      if (skipOpt) submitPromptChoice(jobId, promptData.promptId, -1)
    }
  }
  document.addEventListener('keydown', document._promptKeyHandler)
}

function closePromptModal() {
  document.getElementById('prompt-modal').classList.add('hidden')
  if (document._promptKeyHandler) {
    document.removeEventListener('keydown', document._promptKeyHandler)
    document._promptKeyHandler = null
  }
}

async function submitPromptChoice(jobId, promptId, selectedIndex) {
  closePromptModal()
  try {
    await fetch(`/jobs/${jobId}/input`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ promptId, selectedIndex }),
    })
  } catch (err) {
    console.error('Failed to submit prompt response', err)
  }
}

// ─── Lookup modal ─────────────────────────────────────────────────────────────

let lookupState = null
// shape: { lookupType, stepId, fieldName, stage, searchTerm, results, formatFilters,
//          selectedGroup, selectedFid, releases, loading }

const LOOKUP_TITLES = {
  mal: 'Look up MAL ID',
  tvdb: 'Look up TVDB ID',
  dvdcompare: 'Look up DVDCompare Film ID',
}

function openLookup(lookupType, stepId, fieldName) {
  lookupState = {
    lookupType, stepId, fieldName,
    stage: 'search',
    searchTerm: '',
    results: null,
    formatFilter: 'all',
    selectedGroup: null,
    selectedVariant: null,
    selectedFid: null,
    releases: null,
    loading: false,
    _activeOptions: [],
    _activeResults: null,
    _renderedGroups: null,
  }
  installLookupKeyboardHandler()
  renderLookupModal()
  document.getElementById('lookup-modal').classList.remove('hidden')
  setTimeout(() => document.getElementById('lookup-search-input')?.focus(), 50)
}

function closeLookupModal(event) {
  if (event && event.target !== document.getElementById('lookup-modal')) return
  document.getElementById('lookup-modal').classList.add('hidden')
  uninstallLookupKeyboardHandler()
  lookupState = null
}

function lookupGoBack() {
  if (!lookupState) return
  if (lookupState.stage === 'release') {
    lookupState.stage = 'variant'
  } else if (lookupState.stage === 'variant') {
    lookupState.stage = 'search'
    lookupState.selectedGroup = null
  }
  renderLookupModal()
}

function renderLookupModal() {
  const titleEl = document.getElementById('lookup-title')
  const backBtn = document.getElementById('lookup-back-btn')
  const body = document.getElementById('lookup-body')
  if (!lookupState) return

  titleEl.textContent = LOOKUP_TITLES[lookupState.lookupType] ?? 'Lookup'

  if (lookupState.stage === 'search') {
    backBtn.classList.add('hidden')
    body.innerHTML = renderLookupSearchView()
  } else if (lookupState.stage === 'variant') {
    backBtn.classList.remove('hidden')
    body.innerHTML = renderLookupVariantView()
  } else if (lookupState.stage === 'release') {
    backBtn.classList.remove('hidden')
    body.innerHTML = renderLookupReleaseView()
  }
}

function renderLookupSearchView() {
  const isDvdCompare = lookupState.lookupType === 'dvdcompare'
  const filterOptions = [
    { value: 'all', label: 'All' },
    { value: 'DVD', label: 'DVD' },
    { value: 'Blu-ray', label: 'Blu-ray' },
    { value: 'Blu-ray 4K', label: 'UHD Blu-ray' },
  ]
  const filters = isDvdCompare
    ? `<div class="flex items-center gap-3 text-xs text-slate-400 flex-wrap">
        <span class="font-medium">Format:</span>
        ${filterOptions.map(opt => `
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="radio" name="lookup-format-filter" value="${opt.value}"
              ${lookupState.formatFilter === opt.value ? 'checked' : ''}
              onchange="lookupState.formatFilter=this.value; renderLookupModal()"
              class="w-3.5 h-3.5 bg-slate-700 border-slate-500 accent-blue-500" />
            <span>${esc(opt.label)}</span>
          </label>
        `).join('')}
      </div>`
    : ''

  // Reset _activeOptions; result renderers populate them.
  lookupState._activeOptions = []

  let resultsHtml = ''
  if (lookupState.loading) {
    resultsHtml = '<p class="text-xs text-slate-500 text-center py-4">Searching…</p>'
  } else if (lookupState.results === null) {
    resultsHtml = '<p class="text-xs text-slate-500 text-center py-4">Enter a search term and press Enter.</p>'
  } else if (lookupState.results.length === 0) {
    resultsHtml = '<p class="text-xs text-slate-500 text-center py-4">No results found.</p>'
  } else if (isDvdCompare) {
    resultsHtml = renderDvdCompareSearchResults()
  } else {
    resultsHtml = renderSimpleSearchResults()
  }

  return `
    <div class="flex items-center gap-2">
      <input id="lookup-search-input" type="text" value="${esc(lookupState.searchTerm)}" placeholder="Title to search…"
        oninput="lookupState.searchTerm=this.value"
        onkeydown="if(event.key==='Enter'){event.preventDefault();runLookupSearch(this.value)}"
        class="flex-1 bg-slate-700 text-slate-200 text-xs rounded px-2 py-1.5 border border-slate-600 focus:outline-none focus:border-blue-500" />
      <button onclick="runLookupSearch(document.getElementById('lookup-search-input').value)"
        class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded font-medium shrink-0">Search</button>
    </div>
    ${filters}
    <div class="flex flex-col gap-1.5 overflow-y-auto min-h-0">${resultsHtml}</div>
  `
}

function kbdBadge(index) {
  return index < 9
    ? `<kbd class="text-xs font-mono bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded border border-slate-600 shrink-0">${index + 1}</kbd>`
    : ''
}

// User-facing label for DVDCompare format variants. The internal value
// stays "Blu-ray 4K" because that's the literal token DVDCompare uses.
function displayDvdCompareVariant(variant) {
  return variant === 'Blu-ray 4K' ? 'UHD Blu-ray' : variant
}

// ─── Reverse lookup (manual ID/hash edit → fetch display name) ───────────────

const reverseLookupTimers = new Map()  // key=`${stepId}-${fieldName}` → timeoutId
const reverseLookupTokens = new Map()  // key → latest raw input value (for staleness check)

function setCompanionDisplay(stepId, fieldName, text) {
  const el = document.querySelector(`[data-step="${stepId}"][data-companion="${fieldName}"]`)
  if (!el) return
  el.textContent = text
  el.title = text
  if (text) el.classList.remove('hidden')
  else el.classList.add('hidden')
}

function scheduleReverseLookup(stepId, fieldName, rawValue) {
  const key = `${stepId}-${fieldName}`
  if (reverseLookupTimers.has(key)) {
    clearTimeout(reverseLookupTimers.get(key))
    reverseLookupTimers.delete(key)
  }
  reverseLookupTokens.set(key, rawValue)

  // Clear stale companion immediately so the user doesn't see stale info while typing.
  const step = steps.find(s => s.id === stepId)
  if (!step) return
  const cmd = COMMANDS[step.command]
  const field = cmd?.fields.find(f => f.name === fieldName)
  if (!field?.companionNameField) return
  delete step.params[field.companionNameField]
  setCompanionDisplay(stepId, fieldName, '')
  updateYaml()

  if (!rawValue) return
  const numericValue = Number(rawValue)
  if (!Number.isFinite(numericValue) || numericValue <= 0) return

  const timeoutId = setTimeout(() => {
    reverseLookupTimers.delete(key)
    runReverseLookup(stepId, fieldName, numericValue, rawValue)
  }, 600)
  reverseLookupTimers.set(key, timeoutId)
}

async function runReverseLookup(stepId, fieldName, id, requestToken) {
  const key = `${stepId}-${fieldName}`
  const step = steps.find(s => s.id === stepId)
  if (!step) return
  const cmd = COMMANDS[step.command]
  const field = cmd?.fields.find(f => f.name === fieldName)
  if (!field?.companionNameField) return

  let endpoint, body
  if (field.lookupType === 'mal') {
    endpoint = '/queries/lookupMal'
    body = { malId: id }
  } else if (field.lookupType === 'tvdb') {
    endpoint = '/queries/lookupTvdb'
    body = { tvdbId: id }
  } else if (field.lookupType === 'dvdcompare') {
    endpoint = '/queries/lookupDvdCompare'
    body = { dvdCompareId: id }
  } else if (fieldName === 'dvdCompareReleaseHash') {
    if (!step.params.dvdCompareId) return
    endpoint = '/queries/lookupDvdCompareRelease'
    body = { dvdCompareId: step.params.dvdCompareId, hash: String(id) }
  } else {
    return
  }

  try {
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    if (!resp.ok) return
    const data = await resp.json()
    const name = data.name ?? data.label
    if (!name) return

    // Stale-check: ignore if the user typed something else after this fetch started.
    if (reverseLookupTokens.get(key) !== requestToken) return

    step.params[field.companionNameField] = name
    setCompanionDisplay(stepId, fieldName, name)
    updateYaml()
  } catch (err) {
    console.error('Reverse lookup failed', err)
  }
}

function renderSimpleSearchResults() {
  lookupState._activeResults = lookupState.results
  lookupState._activeOptions = lookupState.results.map((_, index) => () => lookupSelectSimpleByIndex(index))
  return lookupState.results.map((r, index) => {
    let label, id
    if (lookupState.lookupType === 'mal') {
      id = r.malId
      label = `${esc(r.name)}${r.airDate ? ` <span class="text-slate-500">(${esc(r.airDate)})</span>` : ''}${r.mediaType ? ` <span class="text-slate-500">[${esc(r.mediaType)}]</span>` : ''}`
    } else if (lookupState.lookupType === 'tvdb') {
      id = r.tvdbId
      label = `${esc(r.name)}${r.year ? ` <span class="text-slate-500">(${esc(r.year)})</span>` : ''}${r.status ? ` <span class="text-slate-500">[${esc(r.status)}]</span>` : ''}`
    }
    return `<button onclick="lookupSelectSimpleByIndex(${index})"
      class="text-left text-sm px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-blue-700 hover:border-blue-500 transition-colors flex items-center gap-2">
      ${kbdBadge(index)}
      <span class="flex-1 min-w-0 truncate">${label}</span>
      <span class="text-xs font-mono text-slate-500 shrink-0">#${id}</span>
    </button>`
  }).join('')
}

function renderDvdCompareSearchResults() {
  // Group by baseTitle + year, filter by selected format ("all" = no filter)
  const groups = new Map()
  for (const r of lookupState.results) {
    if (lookupState.formatFilter !== 'all' && lookupState.formatFilter !== r.variant) continue
    const key = `${r.baseTitle}|${r.year}`
    if (!groups.has(key)) groups.set(key, { baseTitle: r.baseTitle, year: r.year, variants: [] })
    groups.get(key).variants.push({ id: r.id, variant: r.variant })
  }

  if (groups.size === 0) {
    return '<p class="text-xs text-slate-500 text-center py-4">No results match the selected format.</p>'
  }

  const groupArray = Array.from(groups.values())
  lookupState._renderedGroups = groupArray
  lookupState._activeOptions = groupArray.map((_, index) => () => lookupSelectGroup(index))

  return groupArray.map((group, index) => {
    const variantBadges = group.variants.map(v => `<span class="text-xs font-mono px-1.5 py-0.5 rounded bg-slate-700 text-slate-300">${esc(displayDvdCompareVariant(v.variant))}</span>`).join(' ')
    return `<button onclick="lookupSelectGroup(${index})"
      class="text-left text-sm px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-blue-700 hover:border-blue-500 transition-colors flex items-center gap-2 flex-wrap">
      ${kbdBadge(index)}
      <span class="font-medium">${esc(group.baseTitle)}</span>
      ${group.year ? `<span class="text-slate-500">(${esc(group.year)})</span>` : ''}
      <span class="ml-auto flex gap-1">${variantBadges}</span>
    </button>`
  }).join('')
}

function renderLookupVariantView() {
  const group = lookupState.selectedGroup
  lookupState._activeOptions = group.variants.map((v) => () => lookupSelectVariant(v.id, v.variant))
  const variants = group.variants.map((v, index) => `<button onclick="lookupSelectVariant(${v.id},'${esc(v.variant)}')"
    class="text-left text-sm px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-blue-700 hover:border-blue-500 transition-colors flex items-center gap-2">
    ${kbdBadge(index)}
    <span class="text-xs font-mono px-2 py-0.5 rounded bg-slate-700 text-slate-300">${esc(displayDvdCompareVariant(v.variant))}</span>
    <span class="text-slate-400 text-xs">Film ID</span>
    <span class="font-mono text-xs">#${v.id}</span>
  </button>`).join('')
  return `
    <p class="text-sm text-slate-300">Pick a format for <span class="font-medium">${esc(group.baseTitle)}${group.year ? ` (${esc(group.year)})` : ''}</span>:</p>
    <div class="flex flex-col gap-1.5">${variants}</div>
  `
}

function renderLookupReleaseView() {
  const fid = lookupState.selectedFid
  const filmUrl = `https://www.dvdcompare.net/comparisons/film.php?fid=${fid}`
  let body = ''
  lookupState._activeOptions = []
  if (lookupState.loading) {
    body = '<p class="text-xs text-slate-500 text-center py-4">Loading releases…</p>'
  } else if (!lookupState.releases || lookupState.releases.length === 0) {
    body = '<p class="text-xs text-slate-500 text-center py-4">No release packages found.</p>'
  } else {
    lookupState._activeOptions = lookupState.releases.map((r) => () => lookupSelectRelease(r.hash, r.label))
    body = lookupState.releases.map((r, index) => `<button onclick="lookupSelectReleaseByIndex(${index})"
      class="text-left text-sm px-3 py-2 rounded-lg border border-slate-600 text-slate-200 hover:bg-blue-700 hover:border-blue-500 transition-colors flex items-center gap-2">
      ${kbdBadge(index)}
      <span class="text-xs font-mono text-slate-500 shrink-0">#${esc(r.hash)}</span>
      <span class="flex-1 min-w-0">${esc(r.label || '(no label)')}</span>
    </button>`).join('')
  }
  return `
    <p class="text-sm text-slate-300">Pick a release package (Film ID #${fid}):</p>
    <a href="${filmUrl}" target="_blank" rel="noopener" class="text-xs text-blue-400 hover:text-blue-300 underline">Open film page in new tab ↗</a>
    <div class="flex flex-col gap-1.5 overflow-y-auto min-h-0">${body}</div>
  `
}

async function runLookupSearch(searchTerm) {
  if (!searchTerm || !lookupState) return
  lookupState.searchTerm = searchTerm
  document.getElementById('lookup-search-input')?.blur()
  lookupState.loading = true
  renderLookupModal()
  try {
    const endpoint = lookupState.lookupType === 'mal' ? '/queries/searchMal'
                   : lookupState.lookupType === 'tvdb' ? '/queries/searchTvdb'
                   : '/queries/searchDvdCompare'
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ searchTerm }),
    })
    const data = await resp.json()
    lookupState.results = data.results ?? []
  } catch (err) {
    lookupState.results = []
    console.error('Lookup search failed', err)
  }
  lookupState.loading = false
  renderLookupModal()
}

function lookupSelectSimpleByIndex(index) {
  if (!lookupState) return
  const r = lookupState._activeResults?.[index]
  if (!r) return
  const id = lookupState.lookupType === 'mal' ? r.malId : r.tvdbId
  const step = steps.find(s => s.id === lookupState.stepId)
  if (step) {
    const cmd = COMMANDS[step.command]
    const field = cmd?.fields.find(f => f.name === lookupState.fieldName)
    step.params[lookupState.fieldName] = id
    if (field?.companionNameField && r.name) {
      step.params[field.companionNameField] = r.name
    }
    refreshLinkedInputs()
    updateYaml()
    renderAll()
  }
  closeLookupModal()
}

function lookupSelectGroup(index) {
  if (!lookupState) return
  const group = lookupState._renderedGroups?.[index]
  if (!group) return
  lookupState.selectedGroup = group
  // If only one variant, skip straight to release stage
  if (group.variants.length === 1) {
    lookupSelectVariant(group.variants[0].id, group.variants[0].variant)
    return
  }
  lookupState.stage = 'variant'
  renderLookupModal()
}

async function lookupSelectVariant(fid, variant) {
  if (!lookupState) return
  lookupState.selectedFid = fid
  lookupState.selectedVariant = variant ?? null
  lookupState.stage = 'release'
  lookupState.releases = null
  lookupState.loading = true
  renderLookupModal()
  try {
    const resp = await fetch('/queries/listDvdCompareReleases', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dvdCompareId: fid }),
    })
    const data = await resp.json()
    lookupState.releases = data.releases ?? []
  } catch (err) {
    lookupState.releases = []
    console.error('listDvdCompareReleases failed', err)
  }
  lookupState.loading = false
  renderLookupModal()
}

function lookupSelectReleaseByIndex(index) {
  if (!lookupState) return
  const release = lookupState.releases?.[index]
  if (!release) return
  lookupSelectRelease(release.hash, release.label)
}

function lookupSelectRelease(hash, label) {
  if (!lookupState) return
  const step = steps.find(s => s.id === lookupState.stepId)
  if (step) {
    step.params.dvdCompareId = lookupState.selectedFid
    step.params.dvdCompareReleaseHash = Number(hash) || hash
    const group = lookupState.selectedGroup
    if (group) {
      const variantSuffix = lookupState.selectedVariant && lookupState.selectedVariant !== 'DVD'
        ? ` (${displayDvdCompareVariant(lookupState.selectedVariant)})` : ''
      const yearSuffix = group.year ? ` (${group.year})` : ''
      step.params.dvdCompareName = `${group.baseTitle}${variantSuffix}${yearSuffix}`
    }
    if (label) step.params.dvdCompareReleaseLabel = label
    refreshLinkedInputs()
    updateYaml()
    renderAll()
  }
  closeLookupModal()
}

let lookupKeydownHandler = null

function installLookupKeyboardHandler() {
  uninstallLookupKeyboardHandler()
  lookupKeydownHandler = (event) => {
    if (!lookupState) return
    if (event.key === 'Escape') {
      closeLookupModal()
      return
    }
    // Don't intercept digits while the user is typing in an input
    if (event.target?.tagName === 'INPUT' || event.target?.tagName === 'TEXTAREA') return
    if (event.key >= '1' && event.key <= '9') {
      const index = Number(event.key) - 1
      const handler = lookupState._activeOptions?.[index]
      if (handler) {
        event.preventDefault()
        handler()
      }
    }
  }
  document.addEventListener('keydown', lookupKeydownHandler)
}

function uninstallLookupKeyboardHandler() {
  if (lookupKeydownHandler) {
    document.removeEventListener('keydown', lookupKeydownHandler)
    lookupKeydownHandler = null
  }
}

function updateStepLogs(stepId, logs) {
  const card = document.getElementById(`step-${stepId}`)
  if (!card) return
  let logEl = card.querySelector('.step-logs')
  const text = logs.slice(-8).join('\n')
  if (!logEl) {
    const fieldsEl = card.querySelector('.space-y-2')
    if (fieldsEl) {
      fieldsEl.insertAdjacentHTML('beforebegin',
        `<pre class="step-logs text-xs text-slate-400 bg-slate-950 rounded px-2 py-1.5 mb-2 font-mono max-h-24 overflow-y-auto whitespace-pre-wrap">${esc(text)}</pre>`)
    }
  } else {
    logEl.textContent = text
    logEl.scrollTop = logEl.scrollHeight
  }
}

function updateStepUI(step) {
  const card = document.getElementById(`step-${step.id}`)
  if (!card) return

  // Update status badge
  let badge = card.querySelector('.status-badge')
  if (step.status) {
    const html = renderStatusBadge(step.status)
    if (badge) {
      badge.outerHTML = html
    } else {
      // Insert before action buttons
      const btns = card.querySelector('.flex.items-center.gap-1.shrink-0')
      if (btns) btns.insertAdjacentHTML('beforebegin', html)
    }
  }

  // Update error
  let errEl = card.querySelector('.step-error')
  if (step.error) {
    if (errEl) {
      errEl.textContent = step.error
    } else {
      const fieldsEl = card.querySelector('.space-y-2')
      if (fieldsEl) {
        fieldsEl.insertAdjacentHTML('beforebegin',
          `<p class="step-error text-xs text-red-400 bg-red-950/40 rounded px-2 py-1 mb-2 font-mono">${esc(step.error)}</p>`)
      }
    }
  } else if (errEl) {
    errEl.remove()
  }

  // Remove log output once the step is no longer running
  const logEl = card.querySelector('.step-logs')
  if (logEl && step.status !== 'running') logEl.remove()

  // Render results when the step has finished
  let resultsEl = card.querySelector('.step-results')
  const formatted = step.results && step.results.length > 0 ? formatStepResults(step.command, step.results) : ''
  if (formatted) {
    if (!resultsEl) {
      const fieldsEl = card.querySelector('.space-y-2')
      if (fieldsEl) {
        fieldsEl.insertAdjacentHTML('beforebegin',
          `<details class="step-results text-xs mb-2" open>
            <summary class="cursor-pointer text-emerald-400 hover:text-emerald-300 select-none">▸ Results</summary>
            <pre class="text-emerald-300 bg-slate-950 rounded px-2 py-1.5 mt-1 font-mono whitespace-pre-wrap break-words"></pre>
          </details>`)
        resultsEl = card.querySelector('.step-results')
      }
    }
    if (resultsEl) {
      resultsEl.querySelector('pre').textContent = formatted
    }
  } else if (resultsEl) {
    resultsEl.remove()
  }
}

function formatStepResults(commandName, results) {
  const filenameOf = (path) => String(path ?? '').split(/[\\/]/).pop() || String(path ?? '')

  if (commandName === 'getAudioOffsets') {
    return results.flat().map(item => {
      const file = filenameOf(item?.destinationFilePath)
      const offset = item?.offsetInMilliseconds
      return `${file}: ${offset}ms`
    }).join('\n')
  }

  // Generic fallback — pretty JSON, but unwrap a single array result
  const value = results.length === 1 ? results[0] : results
  try {
    return JSON.stringify(value, null, 2)
  } catch {
    return String(value)
  }
}

// ─── Add command select ───────────────────────────────────────────────────────

function populateCmdPick() {
  const sel = document.getElementById('cmd-pick')
  for (const tag of TAG_ORDER) {
    const cmds = Object.entries(COMMANDS).filter(([,c]) => c.tag === tag)
    if (!cmds.length) continue
    const grp = document.createElement('optgroup')
    grp.label = tag
    for (const [name] of cmds) {
      const opt = document.createElement('option')
      opt.value = name
      opt.textContent = name
      grp.appendChild(opt)
    }
    sel.appendChild(grp)
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────

populateCmdPick()
initPaths()
restoreFromUrl()
renderAll()
</script>
</body>
</html>
