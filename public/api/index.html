<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jobs</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
  }

  h1 {
    max-width: 900px;
    margin: 0 auto 20px;
    font-size: 1.25rem;
    color: #94a3b8;
    font-weight: 500;
  }

  .jobs {
    display: grid;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .job {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .command {
    font-weight: 600;
    font-size: 1.1rem;
    word-break: break-all;
  }

  .status {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    text-transform: uppercase;
    font-weight: 600;
  }

  .status.pending  { background: #1e3a5f; color: #93c5fd; }
  .status.running  { background: #1e3a5f; color: #60a5fa; animation: pulse 2s infinite; }
  .status.completed { background: #064e3b; color: #34d399; }
  .status.failed   { background: #7f1d1d; color: #f87171; }
  .status.cancelled { background: #334155; color: #cbd5e1; }

  .cancel-btn {
    background: transparent;
    border: 1px solid #b45309;
    color: #fbbf24;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .cancel-btn:hover { background: #78350f33; }
  .cancel-btn:disabled { opacity: 0.4; cursor: default; }

  .job-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .meta {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #94a3b8;
    line-height: 1.6;
  }

  .path {
    margin-top: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    background: #020617;
    padding: 6px 8px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .error {
    margin-top: 8px;
    background: #450a0a;
    color: #fca5a5;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  details {
    margin-top: 10px;
  }

  summary {
    cursor: pointer;
    font-size: 0.9rem;
    color: #60a5fa;
    user-select: none;
  }

  .result {
    margin-top: 8px;
    background: #020617;
    padding: 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }

  .log-pane {
    margin-top: 8px;
    background: #020617;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.78rem;
    line-height: 1.45;
    color: #cbd5e1;
    max-height: 320px;
    overflow-y: auto;
    overflow-x: auto;
    white-space: pre;
  }
  .log-pane > div { word-break: break-word; white-space: pre-wrap; }
  .log-pane .log-empty { color: #64748b; font-style: italic; }

  #status-bar {
    max-width: 900px;
    margin: 0 auto 12px;
    font-size: 0.8rem;
    color: #475569;
  }

  #status-bar.error { color: #f87171; }
</style>
</head>
<body>

<h1>Jobs <a href="/builder" style="font-size:0.75rem;font-weight:400;color:#60a5fa;text-decoration:none;margin-left:12px">Sequence Builder ↗</a></h1>
<div id="status-bar">Connecting…</div>
<div class="jobs" id="jobs"></div>

<script>
const statusBar = document.getElementById("status-bar");
const jobsEl = document.getElementById("jobs");

function makeEl(tag, className) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  return el;
}

// /jobs/stream pushes whole-job updates without `logs` (jobStore strips
// them to keep the firehose lean). For sequence jobs we want the live
// log lines visible in-card so the user can see which step is running
// — so we open a per-job /jobs/:id/logs EventSource and accumulate
// lines client-side. Lifetime: opens on first render of a sequence
// job, closes when the SSE sends `{ done: true }`. The maps survive
// across upsertJob's whole-card replacements.
const logsByJobId = new Map();
const logEventSourcesByJobId = new Map();

function appendLogLine(jobId, line) {
  const lines = logsByJobId.get(jobId) ?? [];
  lines.push(line);
  logsByJobId.set(jobId, lines);
  // Direct DOM append on the currently-mounted pane (the card may have
  // been swapped by a status-change upsertJob since we opened the ES).
  const pane = document.querySelector(`[data-id="${jobId}"] .log-pane`);
  if (pane) {
    const empty = pane.querySelector(".log-empty");
    if (empty) empty.remove();
    const node = document.createElement("div");
    node.textContent = line;
    pane.append(node);
    pane.scrollTop = pane.scrollHeight;
  }
}

function ensureLogStream(jobId, jobStatus) {
  if (logEventSourcesByJobId.has(jobId)) return;
  // Skip already-completed jobs that already have their lines in the
  // map (e.g. from a prior open) — re-opening would just replay.
  // Terminal jobs WITHOUT a cached log array still need a one-shot
  // fetch to populate, which the SSE handles by replaying buffered
  // logs and emitting done immediately. So we always open.
  const es = new EventSource(`/jobs/${jobId}/logs`);
  logEventSourcesByJobId.set(jobId, es);
  es.onmessage = (event) => {
    let data;
    try { data = JSON.parse(event.data); }
    catch { return; }
    if (typeof data.line === "string") {
      appendLogLine(jobId, data.line);
    } else if (data.done) {
      es.close();
      logEventSourcesByJobId.delete(jobId);
    }
  };
  es.onerror = () => {
    es.close();
    logEventSourcesByJobId.delete(jobId);
  };
}

function renderJob(job) {
  const card = makeEl("div", "job");
  card.dataset.id = job.id;

  const header = makeEl("div", "job-header");
  const cmd = makeEl("div", "command");
  cmd.textContent = job.commandName ?? job.command ?? "unknown";
  const badge = makeEl("div", `status ${job.status}`);
  badge.textContent = job.status;
  header.append(cmd, badge);

  const meta = makeEl("div", "meta");
  const started = job.startedAt ? new Date(job.startedAt).toLocaleString() : "—";
  meta.textContent = `ID: ${job.id}`;
  meta.append(document.createElement("br"), document.createTextNode(`Started: ${started}`));
  if (job.completedAt) {
    meta.append(document.createElement("br"), document.createTextNode(`Completed: ${new Date(job.completedAt).toLocaleString()}`));
  }

  card.append(header, meta);

  const sourcePath = job.params?.sourcePath;
  if (sourcePath) {
    const path = makeEl("div", "path");
    path.textContent = sourcePath;
    card.append(path);
  }

  if (job.params && typeof job.params === "object" && Object.keys(job.params).length) {
    const details = makeEl("details");
    const summary = makeEl("summary");
    summary.textContent = "Params";
    const params = makeEl("div", "result");
    params.textContent = JSON.stringify(job.params, null, 2);
    details.append(summary, params);
    card.append(details);
  }

  if (job.error) {
    const err = makeEl("div", "error");
    err.textContent = job.error;
    card.append(err);
  }

  if (job.status === "running") {
    // Footer-positioned so it doesn't crowd the status badge in the
    // header. SSE re-render via upsertJob() rebuilds the whole card on
    // the cancelled status flip, so the button just disappears once
    // cancelJob lands — no manual cleanup needed.
    const footer = makeEl("div", "job-footer");
    const cancelBtn = makeEl("button", "cancel-btn");
    cancelBtn.textContent = "⏹ Cancel";
    cancelBtn.title = "Cancel this job (DELETE /jobs/" + job.id + ")";
    cancelBtn.onclick = async () => {
      cancelBtn.disabled = true;
      try {
        await fetch(`/jobs/${job.id}`, { method: "DELETE" });
      } catch (err) {
        console.error("cancel failed", err);
        cancelBtn.disabled = false;
      }
    };
    footer.append(cancelBtn);
    card.append(footer);
  }

  if (job.results?.length) {
    const details = makeEl("details");
    const summary = makeEl("summary");
    summary.textContent = `Results (${job.results.length})`;
    details.append(summary);
    for (const r of job.results) {
      const result = makeEl("div", "result");
      result.textContent = JSON.stringify(r, null, 2);
      details.append(result);
    }
    card.append(details);
  }

  // Live log pane for sequence jobs — running ones stream in via the
  // per-job SSE; terminal ones get their buffered lines replayed once.
  // Open by default while running so the user can watch state without
  // an extra click; closed by default afterwards to keep the list
  // scannable. Replays existing accumulated lines on every render so
  // upsertJob's whole-card replacement doesn't lose scrollback.
  // Terminal jobs open the SSE lazily on first disclosure-toggle so a
  // page reload with N old sequence jobs doesn't blast N parallel SSE
  // requests up front.
  if (job.commandName === "sequence") {
    const details = makeEl("details");
    if (job.status === "running") details.open = true;
    const summary = makeEl("summary");
    summary.textContent = "Logs";
    const pane = makeEl("div", "log-pane");
    const lines = logsByJobId.get(job.id);
    if (lines && lines.length) {
      for (const line of lines) {
        const node = document.createElement("div");
        node.textContent = line;
        pane.append(node);
      }
    } else {
      const empty = makeEl("div", "log-empty");
      empty.textContent = "Waiting for log lines…";
      pane.append(empty);
    }
    details.append(summary, pane);
    card.append(details);
    queueMicrotask(() => { pane.scrollTop = pane.scrollHeight; });
    if (job.status === "running") {
      ensureLogStream(job.id, job.status);
    } else {
      details.addEventListener("toggle", () => {
        if (details.open) ensureLogStream(job.id, job.status);
      }, { once: true });
    }
  }

  return card;
}

function upsertJob(job) {
  const existing = jobsEl.querySelector(`[data-id="${job.id}"]`);
  const card = renderJob(job);
  if (existing) {
    existing.replaceWith(card);
  } else {
    jobsEl.prepend(card);
  }
}

function connect() {
  const es = new EventSource("/jobs/stream");

  es.onopen = () => {
    statusBar.textContent = "Connected";
    statusBar.className = "";
  };

  es.onmessage = (event) => {
    upsertJob(JSON.parse(event.data));
  };

  es.onerror = () => {
    statusBar.textContent = "Connection lost — retrying…";
    statusBar.className = "error";
  };
}

connect();
</script>

</body>
</html>
