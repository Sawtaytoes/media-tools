<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jobs</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
  }

  h1 {
    max-width: 900px;
    margin: 0 auto 20px;
    font-size: 1.25rem;
    color: #94a3b8;
    font-weight: 500;
  }

  .jobs {
    display: grid;
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .job {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .command {
    font-weight: 600;
    font-size: 1.1rem;
    word-break: break-all;
  }

  .status {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    text-transform: uppercase;
    font-weight: 600;
  }

  .status.pending  { background: #1e3a5f; color: #93c5fd; }
  .status.running  { background: #1e3a5f; color: #60a5fa; animation: pulse 2s infinite; }
  .status.completed { background: #064e3b; color: #34d399; }
  .status.failed   { background: #7f1d1d; color: #f87171; }
  .status.cancelled { background: #334155; color: #cbd5e1; }
  .status.skipped  { background: #1f2937; color: #6b7280; }

  .cancel-btn {
    background: transparent;
    border: 1px solid #b45309;
    color: #fbbf24;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .cancel-btn:hover { background: #78350f33; }
  .cancel-btn:disabled { opacity: 0.4; cursor: default; }

  .job-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .builder-btn {
    background: transparent;
    border: 1px solid #2563eb;
    color: #60a5fa;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .builder-btn:hover { background: #1d4ed833; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .meta {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #94a3b8;
    line-height: 1.6;
  }

  .path {
    margin-top: 8px;
    font-family: monospace;
    font-size: 0.85rem;
    background: #020617;
    padding: 6px 8px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .error {
    margin-top: 8px;
    background: #450a0a;
    color: #fca5a5;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  details {
    margin-top: 10px;
  }

  summary {
    cursor: pointer;
    font-size: 0.9rem;
    color: #60a5fa;
    user-select: none;
    /* Flex layout so the inline Copy button can sit at the right edge.
       Suppress the default disclosure marker (a list-item bullet) and
       provide our own ▶/▼ via ::before so it survives the flex switch. */
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before {
    content: "▶";
    display: inline-block;
    font-size: 0.7rem;
    width: 0.9rem;
    transition: transform 120ms ease;
    color: #475569;
  }
  details[open] > summary::before {
    transform: rotate(90deg);
  }
  .copy-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid #334155;
    color: #94a3b8;
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: color 150ms, border-color 150ms;
  }
  .copy-btn:hover { color: #e2e8f0; border-color: #64748b; }
  .copy-btn.copied { color: #34d399; border-color: #34d399; }

  .result {
    margin-top: 8px;
    background: #020617;
    padding: 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }

  .log-pane {
    margin-top: 8px;
    background: #020617;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.78rem;
    line-height: 1.45;
    color: #cbd5e1;
    max-height: 320px;
    overflow-y: auto;
    overflow-x: auto;
    white-space: pre;
  }
  .log-pane > div { word-break: break-word; white-space: pre-wrap; }
  .log-pane .log-empty { color: #64748b; font-style: italic; }

  .steps {
    margin-top: 12px;
    border-top: 1px solid #334155;
    padding-top: 10px;
  }
  .steps-heading {
    font-size: 0.8rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .step {
    background: #0f172a;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border: 1px solid #1e293b;
  }
  .step-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .step-title {
    font-size: 0.9rem;
    color: #e2e8f0;
    word-break: break-all;
  }
  .step-index {
    color: #475569;
    font-variant-numeric: tabular-nums;
    margin-right: 6px;
  }
  .step-id {
    color: #64748b;
    font-family: monospace;
    font-size: 0.78rem;
    margin-left: 6px;
  }
  .step-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step .error {
    margin-top: 6px;
    font-size: 0.78rem;
    padding: 6px 8px;
  }
  .step .log-pane { max-height: 220px; }

  .progress-row {
    margin-top: 10px;
  }
  .progress-bar {
    background: #0f172a;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    height: 100%;
    width: 0%;
    transition: width 250ms linear;
  }
  .progress-bar.indeterminate .progress-fill {
    /* While the fill is indeterminate (no ratio), animate a thin chunk
       sliding right-to-left so the user knows work is happening but
       the magnitude is unknown — same UX shape Material/Bootstrap use. */
    width: 30%;
    animation: indeterminate-slide 1.6s ease-in-out infinite;
  }
  @keyframes indeterminate-slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(330%); }
  }
  .progress-label {
    margin-top: 4px;
    font-size: 0.78rem;
    color: #94a3b8;
    font-variant-numeric: tabular-nums;
  }
  .step .progress-row { margin-top: 8px; }
  .step .progress-bar { height: 4px; }
  .step .progress-label { font-size: 0.72rem; }

  /* Per-file rows shown beneath the main bar when multiple Tasks run
     in parallel. One row per active tracker — sorted in arrival order
     (Map insertion semantics on the server). */
  .progress-files {
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .progress-file-row {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 2px 8px;
    font-size: 0.72rem;
    color: #94a3b8;
    font-variant-numeric: tabular-nums;
  }
  .progress-file-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-file-ratio {
    color: #cbd5e1;
  }
  .progress-file-bar {
    grid-column: 1 / -1;
    background: #0f172a;
    border-radius: 2px;
    height: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress-file-fill {
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    height: 100%;
    width: 0%;
    transition: width 250ms linear;
  }
  .progress-file-bar.indeterminate .progress-file-fill {
    width: 30%;
    animation: indeterminate-slide 1.6s ease-in-out infinite;
  }

  #status-bar {
    max-width: 900px;
    margin: 0 auto 12px;
    font-size: 0.8rem;
    color: #475569;
  }

  #status-bar.error { color: #f87171; }
</style>
</head>
<body>

<h1>Jobs <a href="/builder" style="font-size:0.75rem;font-weight:400;color:#60a5fa;text-decoration:none;margin-left:12px">Sequence Builder ↗</a></h1>
<div id="status-bar">Connecting…</div>
<div class="jobs" id="jobs"></div>

<script src="/sse-utils.js"></script>
<script src="/command-labels.js"></script>
<script>
const statusBar = document.getElementById("status-bar");
const jobsEl = document.getElementById("jobs");

// Authoritative client-side mirror of every job we've seen over the
// /jobs/stream SSE. Indexed by id so we can look up either a top-level
// parent or one of its children in O(1) when an event lands. Children
// are not rendered as standalone cards — they're rendered inside their
// parent's card under the Steps section, so on every event we figure
// out which top-level card to re-render and refresh the whole subtree.
const jobsById = new Map();

// Per-sequence Steps disclosure state. We re-render the parent card on
// every child event, so the <details> open/closed state would reset on
// each render — track explicit user toggles here so a re-render
// preserves them. Absent entry means "use default for current status"
// (open while running, collapsed once terminal), which gives a tidy
// view as old jobs accumulate and reclaims the screen real estate the
// user complained about.
const stepsOpenByJobId = new Map();

function defaultStepsOpen(job) {
  return job.status === "running" || job.status === "pending";
}

function makeEl(tag, className) {
  const el = document.createElement(tag);
  if (className) el.className = className;
  return el;
}

// Build a "📋 Copy" button that writes `getText()` to the clipboard on
// click. The text is fetched lazily so callers can capture a closure
// over a live reference (e.g. the latest accumulated log lines) instead
// of a snapshot frozen at render time. Click also stopPropagations so
// the surrounding <summary> doesn't toggle its <details>.
function makeCopyButton(getText) {
  const btn = makeEl("button", "copy-btn");
  btn.type = "button";
  btn.textContent = "📋 Copy";
  btn.addEventListener("click", (event) => {
    event.stopPropagation();
    event.preventDefault();
    const text = getText() ?? "";
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add("copied");
      btn.textContent = "✓ Copied";
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.textContent = "📋 Copy";
      }, 2000);
    }).catch((error) => {
      console.error("Copy failed", error);
      btn.textContent = "Copy failed";
      setTimeout(() => { btn.textContent = "📋 Copy"; }, 2000);
    });
  });
  return btn;
}

function getChildren(parentId) {
  // Stable order: children are pre-created up front by sequenceRunner
  // in step order, and Map preserves insertion order, so iterating
  // jobsById and filtering yields steps 1..N in the right order.
  const out = [];
  for (const job of jobsById.values()) {
    if (job.parentJobId === parentId) out.push(job);
  }
  return out;
}

// /jobs/stream pushes whole-job updates without `logs` (jobStore strips
// them to keep the firehose lean). For sequence parents AND each child
// step we want live log lines visible in-card so the user can watch
// progress — so we open per-job /jobs/:id/logs EventSources and
// accumulate lines client-side. Lifetime: opens on first render of a
// job whose card needs logs, closes when the SSE sends `{ done: true }`.
// The maps survive across upsertJob's whole-card replacements.
const logsByJobId = new Map();
const logEventSourcesByJobId = new Map();

// Per-job progress snapshot, fed by the same /jobs/:id/logs SSE that
// streams log lines — ProgressEvents ride alongside string log events
// on the same channel (logRoutes pass-through). The server sends an
// authoritative snapshot every event: ratio + filesDone/Total roll up,
// currentFiles is the full set of in-flight Tasks. We merge top-level
// rollup fields (ratio/filesDone/filesTotal) since not every event
// carries them, but currentFiles is a whole-array replace because the
// server already aggregates across all active trackers.
const progressByJobId = new Map();

// Highest SSE `id` we've appended to logsByJobId for each job. The
// server tags every log line with its index in job.logs as the SSE id;
// on reconnect or disclosure re-open the server replays the buffer
// from index 0, but the browser auto-stamps each MessageEvent with
// `lastEventId`. We compare against this map and skip lines whose
// index is at or below what we already have — so the cache stops
// duplicating after the first session opens it.
const lastLogIndexByJobId = new Map();

function mergeProgress(jobId, event) {
  const current = progressByJobId.get(jobId) ?? {};
  const merged = { ...current };
  if (event.ratio !== undefined) merged.ratio = event.ratio;
  if (event.filesDone !== undefined) merged.filesDone = event.filesDone;
  if (event.filesTotal !== undefined) merged.filesTotal = event.filesTotal;
  // currentFiles is authoritative when present; absence means "no
  // active files" and we clear the previous list. Server omits the
  // field entirely when activeFiles is empty.
  merged.currentFiles = Array.isArray(event.currentFiles) ? event.currentFiles : [];
  progressByJobId.set(jobId, merged);
}

// Updates a mounted progress bar in place (no whole-card re-render
// needed for the per-second progress flow). Called from the SSE
// handler for every progress event AND from mountProgressBar after
// an upsertJob whole-card swap, so the bar reflects the latest
// merged snapshot regardless of how it got rendered.
function paintProgressBar(jobId) {
  const container = document.querySelector(`[data-progress-id="${jobId}"]`);
  if (!container) return;
  const snapshot = progressByJobId.get(jobId) ?? {};
  const bar = container.querySelector(".progress-bar");
  const fill = container.querySelector(".progress-fill");
  const label = container.querySelector(".progress-label");
  const ratio = (typeof snapshot.ratio === "number") ? snapshot.ratio : null;
  if (ratio === null) {
    bar.classList.add("indeterminate");
    fill.style.width = "";
  } else {
    bar.classList.remove("indeterminate");
    const pct = Math.max(0, Math.min(1, ratio)) * 100;
    fill.style.width = pct.toFixed(1) + "%";
  }
  // Top-line label: rollup counts + overall percent. Per-file detail
  // moved into the .progress-files stack below the bar.
  const parts = [];
  if (typeof snapshot.filesDone === "number" && typeof snapshot.filesTotal === "number") {
    parts.push(`${snapshot.filesDone}/${snapshot.filesTotal} files`);
  }
  if (ratio !== null) {
    parts.push(`${(ratio * 100).toFixed(0)}%`);
  }
  label.textContent = parts.join(" · ");

  // Per-file rows. Each in-flight tracker becomes one row with a thin
  // bar — multiple visible simultaneously when Tasks run in parallel.
  // Empty list → drop the container so the spacing collapses.
  const filesContainer = container.querySelector(".progress-files");
  const currentFiles = Array.isArray(snapshot.currentFiles) ? snapshot.currentFiles : [];
  if (currentFiles.length === 0) {
    if (filesContainer) filesContainer.replaceChildren();
    return;
  }
  if (!filesContainer) return;
  filesContainer.replaceChildren(
    ...currentFiles.map((entry) => {
      const row = makeEl("div", "progress-file-row");
      const name = makeEl("div", "progress-file-name");
      name.textContent = String(entry.path).split(/[\\/]/).pop() || entry.path;
      name.title = entry.path;
      const ratioCell = makeEl("div", "progress-file-ratio");
      const fileBar = makeEl("div", "progress-file-bar");
      const fileFill = makeEl("div", "progress-file-fill");
      fileBar.append(fileFill);
      if (typeof entry.ratio === "number") {
        ratioCell.textContent = `${(entry.ratio * 100).toFixed(0)}%`;
        fileBar.classList.remove("indeterminate");
        fileFill.style.width = (Math.max(0, Math.min(1, entry.ratio)) * 100).toFixed(1) + "%";
      } else {
        ratioCell.textContent = "";
        fileBar.classList.add("indeterminate");
      }
      row.append(name, ratioCell, fileBar);
      return row;
    }),
  );
}

function mountProgressBar(parent, jobId) {
  // Only mount when there's something to show. Trivially-fast jobs
  // never emit progress (silent-fast rule on the server) so they get
  // no bar at all — keeps the UI quiet for 200ms ops.
  if (!progressByJobId.has(jobId)) return;
  const row = makeEl("div", "progress-row");
  row.dataset.progressId = jobId;
  const bar = makeEl("div", "progress-bar");
  const fill = makeEl("div", "progress-fill");
  bar.append(fill);
  const label = makeEl("div", "progress-label");
  const filesContainer = makeEl("div", "progress-files");
  row.append(bar, label, filesContainer);
  parent.append(row);
  paintProgressBar(jobId);
}

function appendLogLine(jobId, line) {
  const lines = logsByJobId.get(jobId) ?? [];
  lines.push(line);
  logsByJobId.set(jobId, lines);
  // Direct DOM append on the currently-mounted pane (the card may have
  // been swapped by a status-change upsertJob since we opened the ES).
  const pane = document.querySelector(`[data-log-id="${jobId}"]`);
  if (pane) {
    const empty = pane.querySelector(".log-empty");
    if (empty) empty.remove();
    const node = document.createElement("div");
    node.textContent = line;
    pane.append(node);
    pane.scrollTop = pane.scrollHeight;
  }
}

function ensureLogStream(jobId) {
  if (logEventSourcesByJobId.has(jobId)) return;
  const handle = createTolerantEventSource(`/jobs/${jobId}/logs`, {
    onMessage: (data, event) => {
      if (typeof data.line === "string") {
        // Dedup: server tags each line with its job.logs index. On a
        // fresh EventSource the server replays from 0; lastLogIndexByJobId
        // remembers the highest index we've already appended, so the
        // replay's first N lines (already in our cache) get dropped.
        const rawId = event && event.lastEventId;
        if (rawId !== "" && rawId !== undefined && rawId !== null) {
          const idNum = Number(rawId);
          if (Number.isFinite(idNum)) {
            const lastSeen = lastLogIndexByJobId.get(jobId);
            if (lastSeen !== undefined && idNum <= lastSeen) {
              return;
            }
            lastLogIndexByJobId.set(jobId, idNum);
          }
        }
        appendLogLine(jobId, data.line);
      } else if (data.type === "progress") {
        // Top-level rollup fields merge field-by-field; currentFiles
        // is whole-array replace (the server snapshot is authoritative
        // — see mergeProgress).
        const hadEntry = progressByJobId.has(jobId);
        mergeProgress(jobId, data);
        if (!hadEntry) {
          // First progress event for this id — the running card
          // didn't render a bar (no data yet at render time). Trigger
          // one re-render so mountProgressBar wires up the slot;
          // subsequent events paint in place via paintProgressBar.
          const job = jobsById.get(jobId);
          if (job) {
            if (job.parentJobId) {
              const parent = jobsById.get(job.parentJobId);
              if (parent) renderTopLevel(parent);
            } else {
              renderTopLevel(job);
            }
          }
        } else {
          paintProgressBar(jobId);
        }
      } else if (data.done) {
        handle.close();
        logEventSourcesByJobId.delete(jobId);
      }
    },
    // Final-only disconnect → close and forget. Transient blips are
    // absorbed by the helper's grace timer (silent auto-reconnect),
    // and the server's keepalive should make those rare anyway.
    onPossiblyDisconnected: ({ final }) => {
      if (final) {
        handle.close();
        logEventSourcesByJobId.delete(jobId);
      }
    },
  });
  logEventSourcesByJobId.set(jobId, handle);
}

// Encodes a sequence-shaped object as the base64 payload the builder's
// ?seq= URL parameter expects. The builder loads via jsyaml.load which
// accepts JSON natively (YAML is a superset), so we don't need to load
// js-yaml on this page just to round-trip out.
function buildBuilderUrl(sequenceBody) {
  const json = JSON.stringify(sequenceBody);
  // unescape(encodeURIComponent(...)) is the standard browser idiom for
  // turning a Unicode string into a Latin-1 byte string that btoa can
  // accept — same trick the builder uses on the way in.
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return `/builder?seq=${b64}`;
}

function builderUrlForJob(job) {
  if (job.commandName === "sequence" && job.params && typeof job.params === "object") {
    // Sequence umbrella — params is already the {paths, steps} body.
    return buildBuilderUrl(job.params);
  }
  // Single-command job — synthesize a 1-step sequence so the builder
  // opens with this command preloaded. Useful for re-running or tweaking.
  return buildBuilderUrl({
    paths: {},
    steps: [{
      id: "step1",
      command: job.commandName,
      params: (job.params && typeof job.params === "object") ? job.params : {},
    }],
  });
}

function renderCancelButton(jobId) {
  const cancelBtn = makeEl("button", "cancel-btn");
  cancelBtn.textContent = "⏹ Cancel";
  cancelBtn.title = `Cancel this job (DELETE /jobs/${jobId})`;
  cancelBtn.onclick = async () => {
    cancelBtn.disabled = true;
    try {
      await fetch(`/jobs/${jobId}`, { method: "DELETE" });
    } catch (err) {
      console.error("cancel failed", err);
      cancelBtn.disabled = false;
    }
  };
  return cancelBtn;
}

// Mounts a logs <details> for the given job. Re-renders existing
// accumulated lines on every render so upsertJob's whole-card swap
// doesn't lose scrollback. Opens by default while the job is running
// so the user can watch state without an extra click. Lazy-opens the
// SSE for terminal jobs on first disclosure-toggle so a page reload
// with N old jobs doesn't blast N parallel SSE requests up front.
function mountLogsDisclosure(parent, jobId, jobStatus, openByDefault) {
  const details = makeEl("details");
  if (openByDefault && jobStatus === "running") details.open = true;
  const summary = makeEl("summary");
  const summaryText = document.createTextNode("Logs");
  // Lazy getter — captures the live `logsByJobId` entry so a copy issued
  // mid-run grabs every line accumulated up to the click, not just what
  // existed at render time.
  const copyBtn = makeCopyButton(() => (logsByJobId.get(jobId) || []).join("\n"));
  summary.append(summaryText, copyBtn);
  const pane = makeEl("div", "log-pane");
  pane.dataset.logId = jobId;
  const lines = logsByJobId.get(jobId);
  if (lines && lines.length) {
    for (const line of lines) {
      const node = document.createElement("div");
      node.textContent = line;
      pane.append(node);
    }
  } else {
    const empty = makeEl("div", "log-empty");
    empty.textContent = "Waiting for log lines…";
    pane.append(empty);
  }
  details.append(summary, pane);
  parent.append(details);
  queueMicrotask(() => { pane.scrollTop = pane.scrollHeight; });
  if (jobStatus === "running") {
    ensureLogStream(jobId);
  } else {
    details.addEventListener("toggle", () => {
      if (details.open) ensureLogStream(jobId);
    }, { once: true });
  }
}

function renderStepRow(child, index) {
  const row = makeEl("div", "step");

  const header = makeEl("div", "step-header");
  const title = makeEl("div", "step-title");
  const idx = makeEl("span", "step-index");
  idx.textContent = `${index + 1}.`;
  const cmdName = document.createElement("strong");
  cmdName.textContent = commandLabel(child.commandName);
  title.append(idx, cmdName);
  if (child.stepId) {
    const sid = makeEl("span", "step-id");
    sid.textContent = child.stepId;
    title.append(sid);
  }

  const actions = makeEl("div", "step-actions");
  const badge = makeEl("div", `status ${child.status}`);
  badge.textContent = child.status;
  actions.append(badge);
  if (child.status === "running") {
    actions.append(renderCancelButton(child.id));
  }

  header.append(title, actions);
  row.append(header);

  if (child.error) {
    const err = makeEl("div", "error");
    err.textContent = child.error;
    row.append(err);
  }

  // Progress bar only while the step is actively running. Mounts
  // nothing if no progress event has arrived for this child id yet
  // (silent-fast jobs stay quiet).
  if (child.status === "running") {
    mountProgressBar(row, child.id);
  }

  // Skipped steps never ran — they have no logs to stream and no params
  // to flesh out beyond what the parent already shows. Keep them as
  // single-row placeholders so the list stays scannable.
  if (child.status !== "skipped" && child.status !== "pending") {
    mountLogsDisclosure(row, child.id, child.status, true);
  }

  return row;
}

function renderJob(job) {
  const card = makeEl("div", "job");
  card.dataset.id = job.id;

  const header = makeEl("div", "job-header");
  const cmd = makeEl("div", "command");
  cmd.textContent = commandLabel(job.commandName ?? job.command ?? "unknown");
  const badge = makeEl("div", `status ${job.status}`);
  badge.textContent = job.status;
  header.append(cmd, badge);

  const meta = makeEl("div", "meta");
  const started = job.startedAt ? new Date(job.startedAt).toLocaleString() : "—";
  meta.textContent = `ID: ${job.id}`;
  meta.append(document.createElement("br"), document.createTextNode(`Started: ${started}`));
  if (job.completedAt) {
    meta.append(document.createElement("br"), document.createTextNode(`Completed: ${new Date(job.completedAt).toLocaleString()}`));
  }

  card.append(header, meta);

  // Progress bar only on running cards. For sequence umbrellas the
  // bar typically stays hidden (the runner itself doesn't emit
  // progress — its child steps do, on their own ids). For top-level
  // single-command jobs the bar tracks that one command's progress.
  if (job.status === "running") {
    mountProgressBar(card, job.id);
  }

  const sourcePath = job.params?.sourcePath;
  if (sourcePath) {
    const path = makeEl("div", "path");
    path.textContent = sourcePath;
    card.append(path);
  }

  if (job.params && typeof job.params === "object" && Object.keys(job.params).length) {
    const details = makeEl("details");
    const summary = makeEl("summary");
    const summaryText = document.createTextNode("Params");
    const copyBtn = makeCopyButton(() => JSON.stringify(job.params, null, 2));
    summary.append(summaryText, copyBtn);
    const params = makeEl("div", "result");
    params.textContent = JSON.stringify(job.params, null, 2);
    details.append(summary, params);
    card.append(details);
  }

  if (job.error) {
    const err = makeEl("div", "error");
    err.textContent = job.error;
    card.append(err);
  }

  if (job.results?.length) {
    const details = makeEl("details");
    const summary = makeEl("summary");
    summary.textContent = `Results (${job.results.length})`;
    details.append(summary);
    for (const r of job.results) {
      const result = makeEl("div", "result");
      result.textContent = JSON.stringify(r, null, 2);
      details.append(result);
    }
    card.append(details);
  }

  // Live log pane for the job's own log stream. For sequence umbrellas
  // these are the cross-step SEQUENCE markers; for single-command jobs
  // it's the command's own console output. Either way, mounting here
  // gives the user a single scrollable pane per top-level job.
  mountLogsDisclosure(card, job.id, job.status, true);

  // Steps — children of this job (only present when this is a sequence
  // umbrella). Rendered as a <details>/<summary> disclosure so the
  // user can collapse the per-step subtree (often dozens of rows) when
  // they're done watching it. Default is open while the umbrella is
  // running so live progress is visible without an extra click; once
  // the umbrella reaches a terminal state the default flips to
  // collapsed so finished jobs don't hog vertical space. Explicit user
  // toggles override that default and persist across re-renders via
  // stepsOpenByJobId.
  const children = getChildren(job.id);
  if (children.length > 0) {
    const stepsBox = makeEl("details", "steps");
    const initialOpen = stepsOpenByJobId.has(job.id)
      ? stepsOpenByJobId.get(job.id)
      : defaultStepsOpen(job);
    // .open defaults to false; assigning true queues an async toggle
    // event before any user interaction. Skip recording that one event
    // so our own bootstrap doesn't get persisted as a user toggle.
    let ignoreSelfToggle = initialOpen !== false;
    stepsBox.open = initialOpen;
    const heading = makeEl("summary", "steps-heading");
    heading.textContent = `Steps (${children.length})`;
    stepsBox.append(heading);
    children.forEach((child, index) => {
      stepsBox.append(renderStepRow(child, index));
    });
    stepsBox.addEventListener("toggle", () => {
      if (ignoreSelfToggle) {
        ignoreSelfToggle = false;
        return;
      }
      stepsOpenByJobId.set(job.id, stepsBox.open);
    });
    card.append(stepsBox);
  }

  // Action footer: Open-in-Builder for every job + Cancel when running.
  // Builder link goes to /builder?seq=<base64-JSON> — for sequences
  // it's the saved {paths, steps} body, for single-command jobs it's
  // a synthesized 1-step sequence so the user can edit + re-run.
  const footer = makeEl("div", "job-footer");
  const builderLink = makeEl("a", "builder-btn");
  builderLink.textContent = "✎ Open in Sequence Builder";
  builderLink.href = builderUrlForJob(job);
  builderLink.target = "_blank";
  builderLink.rel = "noopener";
  footer.append(builderLink);
  if (job.status === "running") {
    footer.append(renderCancelButton(job.id));
  }
  card.append(footer);

  return card;
}

function upsertJob(job) {
  jobsById.set(job.id, job);

  // Drop any cached progress snapshot once the job reaches a terminal
  // state — the bar is gated on running status so it'd disappear from
  // the DOM either way, but clearing the map keeps it from growing
  // indefinitely on long-running pages.
  if (job.status !== "running" && job.status !== "pending") {
    progressByJobId.delete(job.id);
  }

  // Children are rendered inside their parent's card. If the event is
  // for a child, find its parent and re-render the parent's whole card
  // so the Steps section refreshes. If the parent isn't in the map yet
  // (out-of-order delivery), bail — we'll catch it when the parent's
  // own event lands and getChildren picks the now-stored child up.
  if (job.parentJobId) {
    const parent = jobsById.get(job.parentJobId);
    if (parent) renderTopLevel(parent);
    return;
  }

  renderTopLevel(job);
}

function renderTopLevel(job) {
  const existing = jobsEl.querySelector(`[data-id="${job.id}"]`);
  const card = renderJob(job);
  if (existing) {
    existing.replaceWith(card);
  } else {
    jobsEl.prepend(card);
  }
}

function connect() {
  createTolerantEventSource("/jobs/stream", {
    onConnected: () => {
      statusBar.textContent = "Connected";
      statusBar.className = "";
    },
    // Only fires after the connection has been actively reconnecting
    // for graceMs (default 5s). Most short blips never surface — the
    // browser auto-reconnects and onConnected fires before this would.
    onPossiblyDisconnected: () => {
      statusBar.textContent = "Connection unstable — retrying…";
      statusBar.className = "error";
    },
    onMessage: (job) => upsertJob(job),
  });
}

connect();
</script>

</body>
</html>
