name: NPM Package Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  version:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: corepack enable
      - run: yarn install --immutable
      - uses: changesets/action@v1
        with:
          # Only attempt to publish when NPM_TOKEN is configured. Without
          # this guard, every push to react-migration fails on ENEEDAUTH
          # because changesets/action falls through to publishing any
          # workspace whose current version isn't on npm yet.
          publish: ${{ secrets.NPM_TOKEN && 'yarn changeset publish' || '' }}
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
