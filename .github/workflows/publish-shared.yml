name: Publish @mux-magic/shared

# Triggered by tags of the form `shared-vX.Y.Z`. Tag from local:
#   git tag shared-v0.1.0 && git push --tags
#
# Requires the NPM_TOKEN repo secret to be set (an automation token from
# npmjs.com with publish access to the @mux-magic scope).
#
# This workflow publishes @mux-magic/shared to npm for consumption by
# <media-sync-renamed> and other downstream tools.
on:
  push:
    tags:
      - "shared-v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn workspace @mux-magic/shared run build
      - run: yarn workspace @mux-magic/shared npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
